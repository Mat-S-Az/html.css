<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social project</title>

    <style>
        body {
            background-image:url(imagens/fundo-office.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center center;
        }
        #iphone {
            height: 600px;
            width: 600px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center center;
            background-image: url(imagens/iphone.png);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

        }
        iframe {
            position: relative;
            height: 503px;
            width: 240px;
            top: 60px;
            left: 181px;
            border-radius: 0px 0px 40px 40px;

        }

        #instagram {
            position: absolute;
            left: 90%;
            top: 10%;
        }

        #home {
            position: absolute;
            left: 90%;
            top: 2%;

        }

        #github {
            position: absolute;
            left: 90%;
            top: 18%;

        }

        #youtube {
            position: absolute;
            left: 90%;
            top: 26%;

        }

        .logo{
            height: 50px;
            width: 50px;
            border-radius: 50%;
        }

       

        .logo:hover {
            height: 55px;
            width: 55px;
            box-shadow: 1px 1px 8px rgba(255, 255, 255, 0.459);
        }
        
    </style>
</head>
<body>
    <section>
        <div id="iphone">
            <iframe name="frame" src="http://127.0.0.1:5501/cev/desafios/social-14/home.html" frameborder="0" width="500px" height="300px">

        </iframe>
        </div> 
        <div id="instagram" >
            <a href="http://127.0.0.1:5501/cev/desafios/social-14/insta.html "target="frame">
                <img class="logo" src="imagens/logo-instagram.jpg" alt="instagram" >
            </a>
        </div>  
        <div id="youtube" >
            <a href=https://www.youtube.com/ target="frame">
                <img class="logo" src="imagens/logo-youtube.jpg" alt="instagram" >
            </a>
        </div>
        <div id="home" >
            <a href="http://127.0.0.1:5501/cev/desafios/social-14/home.html"target="frame">
                <img class="logo" src="imagens/logo-home.jpg" alt="instagram" >
            </a>
        </div>
        <div id="github" >
            <a href=https://github.com/Mat-S-Az target="frame">
                <img class="logo" src="imagens/logo-github.jpg" alt="instagram" >
            </a>
        </div>     
    </section>   
</body>
</html>
