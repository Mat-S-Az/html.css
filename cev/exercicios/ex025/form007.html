<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="cadastro.php" method="post">
        <p>
            <label for="iestado">Estado:</label>
            <select name="estado" id="iestado">
                <option value="" selected>Selecione</option>
                <optgroup label="Região Norte">
                    <option value="AC">Acre</option>
                    <option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option>
                    <option value="PA">Pará</option>
                    <option value="RO">Rondônia</option>
                    <option value="RR">Roraima</option>
                    <option value="TO">Tocantins</option>
                </optgroup>
                <optgroup label="Região Nordeste">
                    <option value="AL">Alagoas</option>
                    <option value="BA">Bahia</option>
                    <option value="CE">Ceará</option>
                    <option value="MA">Maranhão</option>
                    <option value="PB">Paraíba</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PI">Piauí</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="SE">Sergipe</option>
                </optgroup>
                <optgroup label="Região Centro-Oeste">
                    <option value="GO">Goiás</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="MS">Mato Grosso do Sul</option>
                    <option value="DF">Distrito Federal</option>
                </optgroup>
                <optgroup label="Região Sudeste">
                    <option value="ES">Espírito Santo</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="SP">São Paulo</option>
                </optgroup>
                <optgroup label="Região Sul">
                    <option value="PR">Paraná</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="SC">Santa Catarina</option>
                </optgroup>
            </select>
        </p>
        <p>
            <label for="iprof">Profissão:</label>
            <input type="text" name="prof" id="iprof" list="lstprof">
            <datalist id="lstprof">
                <option value="Administrador">Administrador</option>
                <option value="Agrônomo">Agrônomo</option>
                <option value="Analista de Sistemas">Analista de Sistemas</option>
                <option value="Assistente Social">Assistente Social</option>
                <option value="Ator">Ator</option>
                <option value="Auxiliar de Enfermagem">Auxiliar de Enfermagem</option>
                <option value="Biólogo">Biólogo</option>
                <option value="Chef de Cozinha">Chef de Cozinha</option>
                <option value="Dentista">Dentista</option>
                <option value="Economista">Economista</option>
                <option value="Eletricista">Eletricista</option>
                <option value="Encanador">Encanador</option>
                <option value="Engenheiro">Engenheiro</option>
                <option value="Enfermeiro">Enfermeiro</option>
                <option value="Fisioterapeuta">Fisioterapeuta</option>
                <option value="Gerente de Vendas">Gerente de Vendas</option>
                <option value="Médico">Médico</option>
                <option value="Nutricionista">Nutricionista</option>
                <option value="Professor">Professor</option>
                <option value="Técnico em Informática">Técnico em Informática</option>
            </datalist>
        </p>
        <p>
           <label for="imsg">Mensagem:</label><br>
           <textarea name="msg" id="imsg" cols="30" rows="10"></textarea>
        </p>


        <p>
            <input type="reset">
            <input type="submit">
        </p>
    </form>
    
</body>
</html>
