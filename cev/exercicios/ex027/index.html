<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        .container {
            background-color: rgb(56, 140, 219);
            display: flex;
            flex-flow: row wrap;
            
           
            
        }
        .item {
            background-color: rgb(233, 111, 11);
            text-align: center;
            border: 1px solid ;
            flex: auto;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">Example of box A</div>
        <div class="item">Example of box B</div>
        <div class="item">Example of box C</div>
        <div class="item">Example of box D</div>
        <div class="item">Example of box E</div>
        <div class="item">Example of box F</div>
    </div>
</body>
</html>
