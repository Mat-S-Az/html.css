<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet"
>
<style>
    .col-12  {
        padding-top: 20px;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col">
                <h1>Our Menu</h1>
                <div class="row">
                    <div class="col-12 col-lg-6">
                        <div class="card">
                            <img src="pexels-fpuhales-13161027.jpg" class="card-img-top" alt="fries">
                            <div class="card-body">
                                <h2 class="card-title">Fries</h2>
                                <p class="card-text">Batata frita</p>
                            </div>
                        </div>

                    </div>
                    <div class="col-12 col-lg-6">
                        <div class="card">
                            <img src="hamburger.jpg" class="card-img-top" alt="hamburger">
                            <div class="card-body">
                                <h2 class="card-title">Hamburger</h2>
                                <p class="card-text">Pao, carne, alface, tomate, ketchup</p>
                            </div>
                        </div>

                    </div>
                    <div class="col-12 col-lg-6">
                        <div class="card">
                            <img src="coxinha.jpg" class="card-img-top" alt="coxinha">
                            <div class="card-body">
                                <h2 class="card-title">Coxinha</h2>
                                <p class="card-text">Frango, Catupiry</p>
                            </div>
                        </div>

                    </div>
                </div>
 
            </div>
            <div class="col-12 col-lg-6">
                <h2>Prices</h2>
                <table  class="table">
                    <tr>
                        <td>French fries</td>
                        <td>$8,00</td>
                    </tr>
                    <tr>
                        <td>Hamburger</td>
                        <td>$12,00</td>
                    </tr>
                    <tr>
                        <td>Coxinha</td>
                        <td>$6,00</td>
                    </tr>
                </table>
                <div class="alert alert-info" role="alert">
                    Experimente as nossas novas Batatas fritas
                </div>

            </div>
        </div>
    </div>
    

    <script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
